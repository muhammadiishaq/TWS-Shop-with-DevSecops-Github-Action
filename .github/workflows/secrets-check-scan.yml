# API Keys, sensitive data, credentials leaking into your codebase can lead to security breaches and unauthorized access.
# GitLeaks is a SAST tool that scans for secrets in your codebase.
name: Secrets Scan

on:

  workflow_call:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Run GitLeaks Scanner
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # gitHub actions manages it
