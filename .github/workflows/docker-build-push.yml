# This workflow builds a Docker image from the Dockerfile in the repository and pushes it to Docker Hub. It is triggered by the build-and-push.yml workflow after a successful build and push of the Docker image.

name: Docker Build & Push

on: 
  workflow_call:

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:

            - name: Code Checkout
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USER }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
                
            - name: Build & Push to Docker Hub
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: |
                    ${{ vars.DOCKERHUB_USER }}/tws_shop:${{ vars.IMAGE_TAG }}
                    ${{ vars.DOCKERHUB_USER }}/tws_shop:${{ vars.IMAGE_LATEST_TAG }}
                    ${{ vars.DOCKERHUB_USER }}/tws_shop:${{ github.sha}} 